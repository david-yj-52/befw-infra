services:
  solace:
    image: solace/solace-pubsub-standard:latest
    container_name: tsh-solace
    restart: unless-stopped
    environment:
      username_admin_globalaccesslevel: admin
      username_admin_password: ${SOLACE_ADMIN_PASSWORD}
      system_scaling_maxconnectioncount: 100  # Standard 무료 라이선스 한도
    ports:
      - "${SOLACE_SMF_PORT:-55555}:55555"   # SMF (Spring Cloud Stream)
      - "${SOLACE_MQTT_PORT:-1883}:1883"     # MQTT
      - "${SOLACE_AMQP_PORT:-5672}:5672"     # AMQP
      - "${SOLACE_REST_PORT:-9000}:9000"     # REST
      - "${SOLACE_WS_PORT:-8008}:8008"     # REST
      - "${SOLACE_MGMT_PORT:-8080}:8080"     # 관리 Web UI
    volumes:
      - tsh-solacedata:/var/lib/solace
    networks:
      - tsh-network
    shm_size: 1g              # Solace 권장 설정
    ulimits:
      memlock: -1
      nofile:
        soft: 2448
        hard: 6592
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/SEMP/v2/config | grep -q solace || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s       # Solace 초기 기동 시간이 김

volumes:
  tsh-solacedata:
    name: tsh-solacedata

networks:
  tsh-network:
    name: tsh-network
    driver: bridge
